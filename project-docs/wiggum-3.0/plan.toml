kind  = "feature"
title = "LocalLlmConfig domain type and [local_llm] plan section"
goal  = """
Add a LocalLlmConfig struct to src/domain/plan.rs that models local LLM
backend configuration for agent routing. Wire it into the Plan struct as an
optional field plan.local_llm: Option<LocalLlmConfig>.

Supported backends:
  - Ollama          — HTTP API at a configurable URL (default: http://localhost:11434)
  - LlamaCpp        — llama.cpp server HTTP API (default: http://localhost:8080)
  - Bonsai          — PrismML Bonsai GGUF model (1-bit or ternary, 8B/4B/1.7B)
                      detected from HuggingFace cache or a configured model_path

LocalLlmConfig should express:
  - backend: LlmBackend enum (Ollama | LlamaCpp | Bonsai)
  - url: Option<String>        — override default endpoint
  - model: Option<String>      — model tag / name (e.g. "prism-ml/bonsai-8b-1bit-q1_0")
  - model_path: Option<String> — explicit GGUF file path (Bonsai / llama.cpp)
  - route_evaluator: bool      — send evaluator agent to local model (default true)
  - route_auditor: bool        — send background auditor to local model (default true)
  - route_retro: bool          — send retro analysis to local model (default true)
"""
