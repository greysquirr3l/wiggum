  3. ~/.local/share/llama.cpp/models/  (bonsai*.gguf)

Ollama detection: GET http://{url}/api/tags (default http://localhost:11434).
LlamaCpp detection: GET http://{url}/health (default http://localhost:8080).

All HTTP requests: 500ms timeout, no retries.
