# wiggum-3.0 — plan.toml
#
# This plan implements wiggum 3.0 enhancements inspired by:
#   - Anthropic's GAN-style harness design article
#   - claude-code-harness (Chachamaru127) — PreCompact hooks, advisor mode, sprint contract wiring
#   - ruflo (ruvnet) — local-LLM routing, pattern persistence, adaptive replan
#   - PrismML Bonsai models (1-bit / ternary, 8B/4B/1.7B) for edge/local inference
#
# ARTIFACT LOCATION
#   All generated artifacts (PROGRESS.md, tasks/, .vscode/, etc.) are written to
#   THIS directory: project-docs/wiggum-3.0/
#
# SOURCE CODE LOCATION
#   The wiggum source code lives at ../../  (the repo root, two levels up).
#   All cargo commands run from the repo root.
#
# Run:
#   wiggum validate project-docs/wiggum-3.0/plan.toml
#   wiggum generate project-docs/wiggum-3.0/plan.toml --dry-run
#   wiggum generate project-docs/wiggum-3.0/plan.toml

# ─── Project ──────────────────────────────────────────────────────────────────

[project]
name        = "wiggum"
description = """
wiggum is an AI orchestration scaffold generator for the Ralph Wiggum loop.
It takes a plan.toml and emits all artifacts needed to run an autonomous
Claude Code / GitHub Copilot agent session: PROGRESS.md, task files,
orchestrator prompt, evaluator prompt, AGENTS.md, and features.json.

This plan (3.0) adds:
  - Weighted/dimensional evaluator criteria with evidence requirements
  - Hollow-pass detection and explicit contract review flow
  - Planner agent prompt generation (brief → plan.toml loop)
  - Parallel task group map injected into the orchestrator template
  - Session-boundary / context-reset protocol in templates
  - PreCompact hook generation (.claude/settings.json)
  - Background auditor prompt artifact
  - Local LLM routing via ollama, llama.cpp, and PrismML Bonsai (1-bit/ternary, 8B/4B/1.7B)
  - wiggum replan command (regenerate a failed task with failure context)
  - wiggum patterns subcommand (cross-project pattern catalog)
  - retro --save flag and harness-complexity dimension in check
"""
language     = "rust"
path         = "/Users/nickcampbell/Projects/rust/wiggum/project-docs/wiggum-3.0"
architecture = "hexagonal"

# ─── Preflight ────────────────────────────────────────────────────────────────
# Run from the repo root (../../ relative to this plan's directory).
# Agents: all cargo commands must be run from /Users/nickcampbell/Projects/rust/wiggum

[preflight]
build = "cargo build --workspace"
test  = "cargo nextest run --workspace 2>/dev/null || cargo test --workspace"
lint  = "cargo clippy --workspace --all-targets -- -W clippy::all -W clippy::pedantic -W clippy::nursery -W clippy::cargo -W clippy::perf -A clippy::module_name_repetitions -A clippy::must_use_candidate -A clippy::missing_errors_doc -A clippy::missing_panics_doc -A clippy::struct_excessive_bools -A clippy::multiple_crate_versions -D clippy::unwrap_used -D clippy::expect_used -D clippy::panic -D clippy::indexing_slicing -D clippy::cast_ptr_alignment -D clippy::suspicious -D warnings"
audit = "cargo deny --all-features check"

# ─── Orchestrator ─────────────────────────────────────────────────────────────

[orchestrator]
persona   = """
You are a senior Rust engineer who knows the wiggum codebase deeply.
wiggum uses a hexagonal / collapsed DDD-lite architecture (single crate):
  domain/    — pure logic: plan model, DAG validation, errors
  generation/ — pure transformation: model → String via Tera templates
  ports.rs   — trait boundaries (ArtifactWriter, PlanReader, ProgressStore)
  adapters/  — all I/O: filesystem, CLI (clap), MCP server

SOURCE CODE ROOT: /Users/nickcampbell/Projects/rust/wiggum  (../../ from task files)
TASK ARTIFACTS:   /Users/nickcampbell/Projects/rust/wiggum/project-docs/wiggum-3.0/

Run ALL cargo commands from the source code root, not from the task artifacts directory.
Use Coraline (coraline_* MCP tools) for code navigation and symbol lookup.
"""
strategy    = "complete"
max_retries = 2
on_failure  = "escalate"
rules = [
    "Rust edition 2024, stable toolchain only (current baseline: Rust 1.95.0). No nightly.",
    "Never use .unwrap() or .expect() on Result/Option — use ? or explicit match/if let.",
    "Never use indexing slicing that can panic (&vec[i], &s[0..n]) — use .get() with explicit handling.",
    "Prefer .is_multiple_of(n) over % n == 0 (Rust 1.87+ method, clippy::manual_is_multiple_of).",
    "Library crates use thiserror; the binary/app layer uses anyhow with context-rich errors.",
    "Do not add #[allow(clippy::...)] suppression — always fix; use #[expect(...)] for unavoidable cases.",
    "Templates live in src/generation/templates.rs as compile-time LazyLock<Tera> constants.",
    "All new domain types must derive Debug, Clone, Serialize, Deserialize.",
    "New EvaluatorConfig fields must be #[serde(default)] to preserve backward compatibility with existing plan.toml files.",
    "New plan.toml sections must be optional with sensible defaults so existing plans continue to work.",
    "Run cargo build --workspace from the repo root before marking any task complete.",
    "Use Coraline for symbol lookup before reading entire files.",
]

# ─── Evaluator ────────────────────────────────────────────────────────────────

[evaluator]
persona        = "You are a skeptical senior Rust engineer acting as QA evaluator. You verify that changes compile, pass all existing tests, are backward-compatible with existing plan.toml files, and follow the project's clippy rules. You re-run preflight commands yourself — never trust the subagent's claim that they passed."
pass_threshold = 8
hard_fail      = true
test_tool      = "cargo nextest run --workspace 2>/dev/null || cargo test --workspace"

# ─── Style ────────────────────────────────────────────────────────────────────

[style]
avoid_ai_patterns = true
avoid_god_files   = true

# ─── Security ─────────────────────────────────────────────────────────────────

[security]
skip_hardening_task = true   # wiggum is a CLI tool, not a web service

# ─── Integration ──────────────────────────────────────────────────────────────

[integration]
skip_wiring_audit = false   # integration wiring audit is critical for this plan
skip_stub_audit   = false

