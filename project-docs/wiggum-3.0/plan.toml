two-phase task loop instead of the standard single-phase loop:

  Phase A — Propose contract (subagent):
    Before writing any code, write a CONTRACT.md file in the task directory:
      tasks/T{NN}-{slug}-contract.md
    Contract contents:
      - Files you will create or modify (exact paths)
      - Types / functions / modules you will add
      - How you will verify each exit criterion (tool + expected output)
      - What you will NOT do in this task (scope boundary)

  Phase B — Evaluate contract (evaluator):
    Read CONTRACT.md and respond APPROVE or REVISE with specific objections.
    The orchestrator waits for APPROVE before spawning the implementation subagent.
    If REVISE: the subagent revises CONTRACT.md and the cycle repeats (max 2 rounds).

  Phase C — Implement (subagent):
    Implement against the APPROVED contract. The contract is binding.

Changes required:
  1. EvaluatorConfig.contract_review: bool (already added in T01 — just wire it here).
  2. ORCHESTRATOR_TEMPLATE: add {% if contract_review %} block that replaces the
     standard step 5 (sprint contract) with the three-phase A/B/C loop above.
  3. EVALUATOR_TEMPLATE: add {% if contract_review %} block with contract review
     instructions (read CONTRACT.md, respond APPROVE/REVISE with specific objections).
  4. Inject contract_review: bool into the orchestrator and evaluator Tera contexts
