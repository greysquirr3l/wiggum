kind  = "feature"
title = "adapters/llm_probe.rs — detect ollama, llama.cpp, and PrismML Bonsai"
goal  = """
Create src/adapters/llm_probe.rs with a non-blocking probe that detects which
local LLM backends are available on the current machine.

pub struct ProbeResult {
    pub ollama: Option<OllamaInfo>,        // available models list
    pub llama_cpp: Option<LlamaCppInfo>,   // server responding
    pub bonsai: Option<BonsaiInfo>,        // GGUF file found on disk
    pub runtime: RuntimeProfile,           // hardware acceleration available
}

pub struct RuntimeProfile {
    pub cuda: bool,          // nvidia-smi returns 0
    pub metal: bool,         // macOS + sysctl hw.optional.arm64 = 1
    pub mlx: bool,           // python3 -c "import mlx" succeeds (silent)
    pub apple_silicon: bool, // sysctl hw.optional.arm64 = 1
}

pub struct BonsaiInfo {
    pub variant: BonsaiVariant,   // OneBit | Ternary
    pub size: BonsaiSize,         // B8 | B4 | B17 (1.7B)
    pub path: PathBuf,            // path to the GGUF file
}

pub enum BonsaiVariant { OneBit, Ternary }
pub enum BonsaiSize    { B8, B4, B17 }

pub fn probe(config: Option<&LocalLlmConfig>) -> ProbeResult
  — Tries each backend, returns what is found. Never panics, never returns an error.
    All network/filesystem failures are silently mapped to None.

