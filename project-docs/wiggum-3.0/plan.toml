[[phases.tasks]]
slug  = "evaluator-template-evidence"
kind  = "feature"
title = "Evaluator template: weighted scorecard, evidence requirements, hollow-pass detection"
goal  = """
Rewrite the EVALUATOR_TEMPLATE constant in src/generation/templates.rs to:

1. Render a weighted scorecard when criteria are provided.
   When {{ criteria }} is non-empty, emit a rubric table:
     | Criterion | Weight | Result | Evidence |
     before the score calculation section.
   When empty, use the existing flat criterion list.

2. Add an ## Evidence Requirements section:
   - The evaluator MUST record the exact command output (or a meaningful excerpt)
     as evidence for each criterion — not a verdict without proof.
   - Forbidden evidence phrases: 'seems to work', 'looks correct', 'appears to pass',
     'should be fine', 'likely passes'. If the evaluator writes these, it must go back
     and re-run the verification.

3. Add a ## Hollow-Pass Detection section instructing the evaluator to:
   - Detect tests that pass but contain no assertions (test body is only setup).
   - Detect clippy clean but with #[allow(...)] suppressions hiding real lint issues.
   - Detect 'build succeeds' but binary panics at runtime on basic input.
   - If any hollow pass is detected, override the criterion result to FAIL and
     document the specific hollow-pass pattern found.

4. Keep all existing template fields and the final output format unchanged.
"""
depends_on = []
hints = [
    "The template uses Tera syntax. New sections are conditional: {% if criteria %}...{% endif %}.",
    "The weighted score formula (when criteria present): sum(criterion.weight * (result == PASS ? 1 : 0)) / 100 * 10.",
    "Keep the existing | Criterion | Result | Evidence | table for the flat (no criteria) case.",
