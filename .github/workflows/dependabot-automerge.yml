name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# Default-deny; auto-merge job expands to contents:write and pull-requests:write.
permissions: {}

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        id: merge
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Auto-merge requires the repository setting "Allow auto-merge" to be
        # enabled. The CLI call will fail with GraphQL "Auto merge is not
        # allowed for this repository" if it isn't. Treat that as a soft
        # warning rather than a hard failure so CI stays green and the PR
        # still requires manual review / merge.
        continue-on-error: true
        run: |
          if gh pr merge --auto --squash "$PR_URL"; then
            echo "merge=enabled" >> "$GITHUB_OUTPUT"
          else
            echo "merge=skipped" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not enable auto-merge. Enable 'Allow auto-merge' in repository settings (Settings → General → Pull Requests) to activate this workflow."
          fi