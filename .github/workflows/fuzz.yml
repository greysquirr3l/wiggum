name: Fuzz

on:
  schedule:
    - cron: "0 3 * * 0" # weekly on Sunday at 03:00 UTC
  workflow_dispatch:
    inputs:
      fuzz-seconds:
        description: "Per-target fuzzing duration in seconds"
        required: false
        default: "600"

# Default-deny.
permissions: {}

jobs:
  fuzz:
    name: Fuzz (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5 (Node 24)

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # main HEAD (no tags published)
        with:
          language: rust
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # main HEAD (no tags published)
        with:
          language: rust
          sanitizer: ${{ matrix.sanitizer }}
          mode: batch
          parallel-fuzzing: true
          fuzz-seconds: ${{ github.event.inputs.fuzz-seconds || '600' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (Node 24)
        with:
          name: fuzz-crashes-${{ matrix.sanitizer }}
          path: |
            **/crash-*
            **/oom-*
            **/timeout-*
          if-no-files-found: ignore