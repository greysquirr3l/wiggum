name: Release

on:
  # Triggered by auto-tag.yml via `gh workflow run` after it pushes the v*
  # tag, and by manual tag pushes / workflow_dispatch. A GITHUB_TOKEN tag
  # push does not retrigger workflows, so auto-tag dispatches this workflow
  # explicitly.
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95.0"

# Default-deny; jobs expand as needed.
permissions: {}

# Don't run two releases for the same tag in parallel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine tag
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG=$(git tag --points-at "$SHA" | grep "^v" | head -n1)
            if [[ -z "$TAG" ]]; then
              echo "No v* tag found on SHA $SHA; nothing to release"
              echo "tag="     >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            # push: tags trigger
            TAG="${{ github.ref_name }}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION"

  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: needs.resolve-tag.outputs.tag != ''
    needs: [resolve-tag]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Wait for CI workflow result on tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail

          sha=$(git rev-list -n1 "${RELEASE_TAG}")
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/actions/runs?head_sha=${sha}&event=push&per_page=50"

          echo "Checking CI status for ${repo}@${sha}"

          for attempt in {1..30}; do
            json=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api}")

            ci_status=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .status' | head -n1)
            ci_conclusion=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .conclusion' | head -n1)

            if [[ -z "${ci_status}" ]]; then
              echo "Attempt ${attempt}/30: CI workflow run not found yet; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_status}" != "completed" ]]; then
              echo "Attempt ${attempt}/30: CI is ${ci_status}; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_conclusion}" == "success" ]]; then
              echo "CI completed successfully for ${sha}"
              exit 0
            fi

            echo "CI did not pass for ${sha}: conclusion=${ci_conclusion}"
            exit 1
          done

          echo "Timed out waiting for CI completion on ${sha}"
          exit 1

  build-binaries:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: wiggum-linux-x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: wiggum-linux-aarch64
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            name: wiggum-macos-aarch64
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: wiggum-windows-x86_64
            use_cross: false
    runs-on: ${{ matrix.os }}
    if: needs.resolve-tag.outputs.tag != ''
    needs: [resolve-tag]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          persist-credentials: false

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}
          cache-prefix: cargo-release-${{ matrix.target }}

      - name: Install cross-compilation tool
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary (native)
        if: matrix.use_cross == false
        run: cargo build --release --bin wiggum --target ${{ matrix.target }} --locked

      - name: Build release binary (cross)
        if: matrix.use_cross
        run: cross build --release --bin wiggum --target ${{ matrix.target }} --locked

      - name: Strip binary (Unix)
        if: runner.os != 'Windows' && matrix.use_cross == false
        run: strip target/${{ matrix.target }}/release/wiggum

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz wiggum
          cd ../../..

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip wiggum.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7 (Node 24)
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
          if-no-files-found: error

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: needs.resolve-tag.outputs.tag != ''
    needs: [resolve-tag, verify-ci]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          persist-credentials: false

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
          cache-prefix: cargo-publish

      - name: Verify version matches tag
        env:
          RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "wiggum") | .version')
          if [ "$CARGO_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Version mismatch: Cargo.toml has $CARGO_VERSION, tag is $RELEASE_VERSION"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
        run: |
          set -o pipefail
          log=$(mktemp)
          trap 'rm -f "$log"' EXIT

          # Race-tolerant publish: a parallel/concurrent publish or a stale
          # crates.io index can cause "already exists" between pre-checks and
          # the actual upload. Treat that single error as a success.
          if cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}" 2>&1 | tee "$log"; then
            echo "wiggum@${RELEASE_VERSION} published successfully"
            exit 0
          fi

          if grep -qE "already exists on crates.io" "$log"; then
            echo "wiggum@${RELEASE_VERSION} already published (treating as success)"
            exit 0
          fi

          echo "::error::cargo publish failed for wiggum@${RELEASE_VERSION}"
          exit 1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: needs.resolve-tag.outputs.tag != ''
    needs: [resolve-tag, build-binaries, publish-crate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8 (Node 24)
        with:
          path: artifacts

      - name: Extract changelog for this version
        id: changelog
        env:
          RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
        run: |
          VERSION="${RELEASE_VERSION}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?$VERSION\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          else
            NOTES="Release $VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9 # v3 (Node 24)
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: artifacts/**/*
          draft: false
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          prerelease: ${{ contains(needs.resolve-tag.outputs.version, '-alpha') || contains(needs.resolve-tag.outputs.version, '-beta') || contains(needs.resolve-tag.outputs.version, '-rc') }}