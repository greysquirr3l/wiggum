name: Release

on:
  # Triggered by auto-tag.yml pushing a version tag via GITHUB_TOKEN.
  # A GITHUB_TOKEN push cannot trigger on: push: tags, so we chain via
  # workflow_run instead to avoid the GitHub Actions re-trigger restriction.
  workflow_run:
    workflows: ["Auto-tag on release merge"]
    types: [completed]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95.0"

# Top-level permissions - individual jobs may override
permissions:
  contents: read

jobs:
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    # Skip if this is a workflow_run that didn't succeed
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG=$(git tag --points-at "$SHA" | grep "^v" | head -n1)
            if [[ -z "$TAG" ]]; then
              echo "No v* tag found on SHA $SHA; nothing to release"
              exit 1
            fi
          else
            # push: tags trigger
            TAG="${{ github.ref_name }}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION"

  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    needs: [resolve-tag]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for CI workflow result on tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail

          sha=$(git rev-list -n1 "${RELEASE_TAG}")
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/actions/runs?head_sha=${sha}&event=push&per_page=50"

          echo "Checking CI status for ${repo}@${sha}"

          for attempt in {1..30}; do
            json=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api}")

            ci_status=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .status' | head -n1)
            ci_conclusion=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .conclusion' | head -n1)

            if [[ -z "${ci_status}" ]]; then
              echo "Attempt ${attempt}/30: CI workflow run not found yet; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_status}" != "completed" ]]; then
              echo "Attempt ${attempt}/30: CI is ${ci_status}; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_conclusion}" == "success" ]]; then
              echo "CI completed successfully for ${sha}"
              exit 0
            fi

            echo "CI did not pass for ${sha}: conclusion=${ci_conclusion}"
            exit 1
          done

          echo "Timed out waiting for CI completion on ${sha}"
          exit 1

  build-binaries:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: wiggum-linux-x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: wiggum-linux-aarch64
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            name: wiggum-macos-aarch64
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: wiggum-windows-x86_64
            use_cross: false
    runs-on: ${{ matrix.os }}
    needs: [resolve-tag]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tool
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      - name: Build release binary (native)
        if: matrix.use_cross == false
        run: cargo build --release --bin wiggum --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.use_cross
        run: cross build --release --bin wiggum --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows' && matrix.use_cross == false
        run: strip target/${{ matrix.target }}/release/wiggum

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz wiggum
          cd ../../..

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip wiggum.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
          if-no-files-found: ignore

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [resolve-tag, verify-ci]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Verify version matches tag
        env:
          RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "wiggum") | .version')
          if [ "$CARGO_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Version mismatch: Cargo.toml has $CARGO_VERSION, tag is $RELEASE_VERSION"
            exit 1
          fi

      - name: Publish to crates.io
        run: |
          WIGGUM_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "wiggum") | .version')
          if cargo search wiggum --limit 1 2>/dev/null | grep -q "^wiggum = \"$WIGGUM_VERSION\""; then
            echo "wiggum@$WIGGUM_VERSION already published, skipping"
          else
            cargo publish 2>&1 || {
              # Tolerate "already exists" from index lag; fail on real errors
              if cargo search wiggum --limit 1 2>/dev/null | grep -q "^wiggum = \"$WIGGUM_VERSION\""; then
                echo "wiggum@$WIGGUM_VERSION confirmed published (index caught up)"
              else
                exit 1
              fi
            }
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-binaries, publish-crate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog for this version
        id: changelog
        env:
          RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
        run: |
          VERSION="${RELEASE_VERSION}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?$VERSION\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          else
            NOTES="Release $VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: artifacts/**/*
          draft: false
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          prerelease: ${{ contains(needs.resolve-tag.outputs.version, '-alpha') || contains(needs.resolve-tag.outputs.version, '-beta') || contains(needs.resolve-tag.outputs.version, '-rc') }}
