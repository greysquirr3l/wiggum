name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "project-docs/docs_source/**"
      - "project-docs/book.toml"
  workflow_dispatch:

# Default-deny; jobs expand to the minimum they need.
permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5 (Node 24)

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@a6f333f62c4b46ed5190d00cab3b7f9a6996274c # main HEAD (Node 24; v2.0.0 tag is Node 20)
        with:
          mdbook-version: "latest"

      - name: Build documentation
        run: mdbook build project-docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@98ef48e41587a300b82de4cf298aa98b57b2faae # main HEAD (v5.0.0 tag works but newer is safer)
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0 (Node 24)