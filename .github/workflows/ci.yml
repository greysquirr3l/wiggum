name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  RUST_VERSION: "1.95.0"

# Default-deny permissions; each job opts in to the minimum it needs.
permissions: {}

# Cancel superseded PR runs but never cancel main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: cargo check
        run: cargo check --all-targets --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: cargo test
        run: cargo test --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: cargo doc
        run: cargo doc --no-deps --locked
        env:
          RUSTDOCFLAGS: "-Dwarnings"

  cross-platform:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: cargo test
        run: cargo test --locked