version: 2
updates:
  # Enable Dependabot version updates for Rust dependencies
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - greysquirr3l
    assignees:
      - greysquirr3l
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
      include: "scope"
    labels:
      - dependencies
      - rust
    allow:
      - dependency-type: all
    ignore:
      # Ignore major version bumps for now; apply manually after testing
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # Enable Dependabot security updates (all channels)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    reviewers:
      - greysquirr3l
    assignees:
      - greysquirr3l
    commit-message:
      prefix: "ci(actions):"
      include: "scope"
    labels:
      - github-actions
